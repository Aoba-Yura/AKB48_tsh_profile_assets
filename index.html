<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKB48 TSH Profile Assets</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #fdf2f8 0%, #fff7fb 45%, #f8fbff 100%);
      --card: rgba(255, 255, 255, 0.82);
      --border: rgba(217, 79, 138, 0.16);
      --text: #3f2a36;
      --accent: #d94f8a;
      --shadow: 0 18px 50px rgba(178, 88, 128, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      padding: 44px 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(217, 79, 138, 0.12);
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.15;
      letter-spacing: 0.02em;
    }

    p {
      margin: 16px 0 0;
      font-size: 16px;
      line-height: 1.8;
      color: rgba(63, 42, 54, 0.78);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">AKB48 TSH</div>
    <h1>Profile Assets</h1>
    <p>社会队米娜桑的图片文件库</p>
  </main>
</body>
</html>
